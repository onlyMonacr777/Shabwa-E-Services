name: shabwa_e_services
description: "بـوابـة شـبـوة للخـدمـات الإلكـترونية"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  provider: ^6.1.2

  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  file_picker: ^10.1.9

  firebase_core: ^4.1.1
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/